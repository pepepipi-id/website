<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ Admin Panel Pepepipi</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#FAFAF8] text-gray-800 antialiased min-h-screen py-10 px-4">

  <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
    
    <div class="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit sticky top-10">
      <h2 class="text-xl font-bold text-[#5CA7D4] mb-6">🚀 Input Produk Baru</h2>
      
      <div id="statusMessage" class="hidden p-4 rounded-xl mb-4 text-sm font-medium"></div>

      <form id="adminForm" class="space-y-4">
        <div>
          <label class="block text-xs font-bold uppercase mb-1 text-gray-500">Nama Produk</label>
          <input id="nama" type="text" placeholder="Contoh: Sensory Play Kit" class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:outline-none focus:border-[#5CA7D4]" required />
        </div>

        <div>
          <label class="block text-xs font-bold uppercase mb-1 text-gray-500">Kategori</label>
          <select id="kategori" class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:outline-none focus:border-[#5CA7D4]" required>
            <option value="aktivitas">Aktivitas Anak (Kartu Biru)</option>
            <option value="hampers">Paket Hampers (Kartu Oranye)</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase mb-1 text-gray-500">Harga (Rp)</label>
          <input id="harga" type="number" placeholder="Contoh: 85000" class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:outline-none focus:border-[#5CA7D4]" required />
        </div>

        <div>
  <label class="block text-xs font-bold uppercase mb-1 text-gray-500">Label Terjual</label>
  <input id="label_terjual" type="text" placeholder="Contoh: 100+" class="w-full px-4 py-2 rounded-xl border border-gray-200 focus:outline-none focus:border-[#5CA7D4]" required />
</div>

        <div>
          <label class="block text-xs font-bold uppercase mb-1 text-gray-500">Foto Produk</label>
          <div id="dropZone" class="w-full h-36 border-2 border-dashed border-gray-200 rounded-2xl flex flex-col items-center justify-center p-4 bg-gray-50 hover:bg-gray-100/50 hover:border-[#5CA7D4] transition cursor-pointer relative overflow-hidden group">
            
            <input type="file" id="fileInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" />
            
            <img id="imagePreview" class="absolute inset-0 w-full h-full object-cover hidden" />
            
            <div id="dropZoneText" class="text-center pointer-events-none space-y-1">
              <span class="text-2xl block">📸</span>
              <p class="text-xs font-semibold text-gray-600">Drag & Drop gambar ke sini</p>
              <p class="text-[10px] text-gray-400">Atau klik untuk pilih file</p>
            </div>

            <button type="button" id="btnRemoveImage" class="absolute top-2 right-2 bg-red-500 text-white p-1 rounded-lg text-[10px] font-bold opacity-0 group-hover:opacity-100 transition hidden">Hapus X</button>
          </div>
        </div>

        <button type="submit" id="btnSubmit" class="w-full bg-[#5CA7D4] hover:bg-[#4b96c2] text-white py-2.5 rounded-xl font-bold shadow-sm transition cursor-pointer text-center block">
          Simpan ke Supabase
        </button>
      </form>
    </div>

    <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <div class="flex items-center justify-between border-b border-gray-100 pb-3 mb-4">
          <h3 class="font-bold text-gray-800 flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-[#5CA7D4]"></span> Aktivitas Anak
          </h3>
          <span id="countAktivitas" class="text-xs font-bold bg-blue-50 text-[#5CA7D4] px-2.5 py-0.5 rounded-full">0</span>
        </div>
        <div id="listAktivitas" class="space-y-3 max-h-[500px] overflow-y-auto pr-1">
          <p class="text-sm text-gray-400 italic text-center py-4">Memuat data...</p>
        </div>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
        <div class="flex items-center justify-between border-b border-gray-100 pb-3 mb-4">
          <h3 class="font-bold text-gray-800 flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-orange-400"></span> Paket Hampers
          </h3>
          <span id="countHampers" class="text-xs font-bold bg-orange-50 text-orange-500 px-2.5 py-0.5 rounded-full">0</span>
        </div>
        <div id="listHampers" class="space-y-3 max-h-[500px] overflow-y-auto pr-1">
          <p class="text-sm text-gray-400 italic text-center py-4">Memuat data...</p>
        </div>
      </div>
    </div>

  </div>

 <script>
    // 1. Konfigurasi Supabase
    const SUPABASE_URL = "https://tenmhpyoqfyxsimfrxmt.supabase.co/"
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlbm1ocHlvcWZ5eHNpbWZyeG10Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMDc0NTgsImV4cCI6MjA5NzU4MzQ1OH0.I-ehm4iXE69wx3b7rXF6f50Id-NrKHlTzj3c7QSVkSM"
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

    // DOM Elements
    const form = document.getElementById('adminForm');
    const statusMsg = document.getElementById('statusMessage');
    const btnSubmit = document.getElementById('btnSubmit');
    const listAktivitas = document.getElementById('listAktivitas');
    const listHampers = document.getElementById('listHampers');
    const countAktivitas = document.getElementById('countAktivitas');
    const countHampers = document.getElementById('countHampers');

    // Drag & Drop DOM
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const imagePreview = document.getElementById('imagePreview');
    const dropZoneText = document.getElementById('dropZoneText');
    const btnRemoveImage = document.getElementById('btnRemoveImage');
    
    let selectedFile = null;

    // 2. Logika Drag and Drop Event Listener
    ['dragenter', 'dragover'].forEach(eventName => {
      dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        dropZone.classList.add('border-[#5CA7D4]', 'bg-blue-50/30');
      }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        dropZone.classList.remove('border-[#5CA7D4]', 'bg-blue-50/30');
      }, false);
    });

    dropZone.addEventListener('drop', (e) => {
      const dt = e.dataTransfer;
      const files = dt.files;
      if (files.length) handleImageSelect(files[0]);
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length) handleImageSelect(e.target.files[0]);
    });

    function handleImageSelect(file) {
      if (!file.type.startsWith('image/')) {
        alert('File harus berupa gambar!');
        return;
      }
      selectedFile = file;
      
      // Tampilkan preview lokal di browser
      const reader = new FileReader();
      reader.onload = (e) => {
        imagePreview.src = e.target.result;
        imagePreview.classList.remove('hidden');
        dropZoneText.classList.add('hidden');
        btnRemoveImage.classList.remove('hidden');
      }
      reader.readAsDataURL(file);
    }

    btnRemoveImage.addEventListener('click', (e) => {
      e.stopPropagation(); // Mencegah klik menembak ke file input
      selectedFile = null;
      fileInput.value = '';
      imagePreview.classList.add('hidden');
      dropZoneText.classList.remove('hidden');
      btnRemoveImage.classList.add('hidden');
    });


    // 3. Ambil & Render List Data dari Supabase
    async function fetchAndRenderProducts() {
      try {
        const { data: products, error } = await _supabase
          .from('products')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;

        listAktivitas.innerHTML = '';
        listHampers.innerHTML = '';

        // Catatan: Supabase kamu menyimpan dengan huruf kapital awal seperti "Aktivitas" dan "Hampers"
        // Kita gunakan .toLowerCase() agar pencocokan string lebih aman
        const aktivitasItems = products.filter(p => p.kategori && p.kategori.toLowerCase() === 'aktivitas');
        const hampersItems = products.filter(p => p.kategori && p.kategori.toLowerCase() === 'hampers');

        countAktivitas.innerText = aktivitasItems.length;
        countHampers.innerText = hampersItems.length;

        if(!aktivitasItems.length) listAktivitas.innerHTML = `<p class="text-xs text-gray-400 italic text-center py-4">Belum ada data aktivitas</p>`;
        if(!hampersItems.length) listHampers.innerHTML = `<p class="text-xs text-gray-400 italic text-center py-4">Belum ada data hampers</p>`;

        aktivitasItems.forEach(item => listAktivitas.appendChild(createItemRow(item)));
        hampersItems.forEach(item => listHampers.appendChild(createItemRow(item)));

      } catch (err) {
        console.error("Gagal memuat daftar produk:", err.message);
      }
    }

    function createItemRow(item) {
      const div = document.createElement('div');
      div.className = "flex items-center justify-between p-3 bg-gray-50 rounded-xl border border-gray-100 hover:border-gray-200 transition group";
      
      // Mengubah item.nama menjadi item.nama_produk dan item.gambar_url menjadi item.foto_url
      div.innerHTML = `
        <div class="min-w-0 flex-1 pr-2 flex items-center gap-3">
          <img src="${item.foto_url}" class="w-10 h-10 object-cover rounded-lg bg-gray-100 flex-shrink-0" onerror="this.src='https://placehold.co/100x100?text=No+Image'"/>
          <div class="min-w-0">
  <h4 class="text-sm font-semibold text-gray-800 truncate">
    ${item.nama_produk || 'Tanpa Nama'}
  </h4>

  <p class="text-xs text-gray-500 font-medium">
    Rp ${Number(item.harga).toLocaleString('id-ID')}
  </p>

  <p class="text-[11px] text-orange-500 font-semibold">
    <span class="text-[10px] px-2 py-0.5 rounded-full bg-orange-100 text-orange-600 font-semibold">
    🔥 Terjual ${item.label_terjual || '0'}
  </span>
  </p>
</div>
        </div>
        <button onclick="deleteProduct(${item.id}, '${item.nama_produk ? item.nama_produk.replace(/'/g, "\\'") : 'Produk'}')" class="text-xs text-red-400 hover:text-red-600 font-medium cursor-pointer p-1 rounded hover:bg-red-50 transition opacity-80 md:opacity-0 group-hover:opacity-100">
          🗑️ Hapus
        </button>
      `;
      return div;
    }

    async function deleteProduct(id, nama) {
      if (!confirm(`Apakah kamu yakin ingin menghapus "${nama}"?`)) return;
     try {

    // Ambil data produk
    const { data: product, error: fetchError } =
      await _supabase
        .from('products')
        .select('foto_url')
        .eq('id', id)
        .single();

    if (fetchError) throw fetchError;

    // Hapus gambar jika bukan placeholder
    if (
      product.foto_url &&
      !product.foto_url.includes('placehold.co')
    ) {

      const fileName = product.foto_url.split('/').pop();

const { data: removeData, error: storageError } =
  await _supabase.storage
    .from('pepepipi-assets')
    .remove([fileName]);

console.log("Menghapus:", fileName);
console.log("Hasil:", removeData);
console.log("Error:", storageError);

if (storageError) {
  throw storageError;
}
    }

    // Hapus database
    const { error } =
      await _supabase
        .from('products')
        .delete()
        .eq('id', id);

    if (error) throw error;

    fetchAndRenderProducts();

  } catch (err) {
    alert("Gagal menghapus: " + err.message);
  }
}


    // 4. Logika Simpan Data Form
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  
if (!selectedFile) {
    statusMsg.className =
  "p-3 rounded-xl mb-4 text-xs font-medium bg-red-50 text-red-700 block";

statusMsg.innerText =
  "Semua field wajib diisi termasuk foto produk.";

return;
  }

  btnSubmit.disabled = true;
  btnSubmit.innerText = "Mengupload Gambar...";
  statusMsg.classList.add('hidden');

  const namaInput = document.getElementById('nama').value;
  const kategoriInput = document.getElementById('kategori').value;
  const hargaInput = parseInt(document.getElementById('harga').value);
  const labelTerjualInput = document.getElementById('label_terjual').value; // Ambil nilai baru
  
  let finalImageUrl = 'https://placehold.co/300x300?text=No+Image';

  try {
    if (selectedFile) {
        const fileExt = selectedFile.name.split('.').pop();

  const fileName = `${Date.now()}.${fileExt}`;

  const { data: uploadData, error: uploadError } =
    await _supabase.storage
      .from('pepepipi-assets')
      .upload(fileName, selectedFile);

  if (uploadError) throw uploadError;

  const { data: publicUrlData } =
    _supabase.storage
      .from('pepepipi-assets')
      .getPublicUrl(fileName);

  finalImageUrl = publicUrlData.publicUrl;
    }

    btnSubmit.innerText = "Menyimpan Data...";

    const formattedKategori = kategoriInput.charAt(0).toUpperCase() + kategoriInput.slice(1);

    // INSERT dengan kolom yang sesuai
    const { error: insertError } = await _supabase
      .from('products')
      .insert([{ 
        nama_produk: namaInput, 
        kategori: formattedKategori, 
        harga: hargaInput, 
        label_terjual: labelTerjualInput, // Menggunakan kolom yang benar
        foto_url: finalImageUrl, 
        is_active: true 
      }]);

    if (insertError) throw insertError;

    statusMsg.className = "p-3 rounded-xl mb-4 text-xs font-medium bg-green-50 text-green-700 block";
    statusMsg.innerText = `Berhasil menambahkan "${namaInput}"!`;
    
    form.reset();
    btnRemoveImage.click();
    fetchAndRenderProducts();

  } catch (err) {
    statusMsg.className = "p-3 rounded-xl mb-4 text-xs font-medium bg-red-50 text-red-700 block";
    statusMsg.innerText = "Gagal: " + err.message;
  } finally {
    btnSubmit.disabled = false;
    btnSubmit.innerText = "Simpan ke Supabase";
  }
});

    fetchAndRenderProducts();

  </script>
</body>
</html>
